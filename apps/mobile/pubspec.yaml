name: chatly
description: Chatly - A private, secure, and end-to-end encrypted messaging application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database & Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Cryptography (For Signal Protocol / Double Ratchet / E2E)
  cryptography: ^2.5.0

  # Network
  web_socket_channel: ^2.4.1
  dio: ^5.4.0
  mobile_scanner: ^5.0.0

  # UI & Design
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  intl: ">=0.18.0 <0.21.0"

  # Utilities
  url_launcher: ^6.2.5
  flutter_secure_storage: ^9.2.1
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  crypto: ^3.0.3

  # Push Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.0.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
