### [MODIFY] `package.json` scripts
Add a production start script that runs the compiled JavaScript:
```json
"scripts": {
  "dev": "ts-node-dev --respawn --transpile-only src/server.ts",
  "build": "tsc",
  "start": "node dist/server.js",
  "test": "echo \"Error: no test specified\" && exit 1"
},
```
---
### [ADD] CI step (optional)
If you want GitHub Actions to deploy to Render automatically, add a step using the Render Deploy GitHub Action.
```yaml
- name: Deploy to Render
  uses: render-examples/render-deploy@v1
  with:
    apiKey: ${{ secrets.RENDER_API_KEY }}
    serviceId: ${{ secrets.RENDER_SERVICE_ID }}
```
(You would need to store the Render API key and service ID as repository secrets.)
---
## Verification Plan
1. **Local Test**: Run `npm install && npm run build && npm start` locally to ensure the server starts without `.env` (it will fallback to defaults or log warnings). Verify endpoints (`/api/auth/*`) work against a local PostgreSQL instance.
2. **Render Deploy**:
   - Push the new files to `main`.
   - Render will automatically create the service and a PostgreSQL add‑on (if selected).
   - Set the required environment variables in the Render dashboard.
   - Verify the health endpoint (`https://<service>.onrender.com/`) returns JSON with `status: "running"`.
   - Test the Flutter app by updating its `BASE_URL` (if it uses one) to the Render URL and confirm login/registration works.

