# Deploy Chatly Backend on Render

**Goal**: Enable the `chatly-server` backend to run on Render, providing a live API for login/registration and connecting to a PostgreSQL database.

## User Review Required
> [!IMPORTANT]
> The following decisions need your confirmation:
> - **Render Service Name**: Choose a name for the Render web service (e.g., `chatly-backend`).
> - **Database Provisioning**: Use Render's managed PostgreSQL add‑on (recommended) or provide an external DB URL.
> - **Environment Variables**: Verify the values for `JWT_SECRET`, `ALLOWED_ORIGINS`, and other secrets.
> - **Docker vs. Native Build**: Render can build the Node service directly; a Dockerfile is optional.

## Open Questions
> [!WARNING]
> - Do you want to include a custom domain for the Render service? If yes, provide the domain name.
> - Should the backend be deployed with a Dockerfile for more control, or rely on Render's default Node build?

## Proposed Changes
---
### [ADD] Render configuration
#### [NEW] `render.yaml`
```yaml
services:
  - type: web
    name: chatly-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false   # set in Render UI
      - key: ALLOWED_ORIGINS
        sync: false   # set in Render UI (comma‑separated list of allowed client URLs)
      - key: DATABASE_URL
        sync: false   # Render will auto‑populate if you add a PostgreSQL add‑on
    autoDeploy: true
    branch: main
```
---
### [ADD] `.env.example`
Create an example env file (already present but add clearer defaults):
```env
# Server configuration
PORT=5000
HOST=0.0.0.0

# Security
JWT_SECRET=change‑me‑to‑a‑strong‑random‑string
ALLOWED_ORIGINS=https://your‑frontend‑url.com

# Database (Render will provide this when you add a PostgreSQL add‑on)
# DATABASE_URL=postgresql://user:password@hostname:5432/chatly

# Optional Redis cache (Render also offers Redis)
# REDIS_URL=redis://redis-host:6379
```
