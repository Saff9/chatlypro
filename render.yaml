services:
  - type: web
    name: chatly-backend
    env: node
    plan: free
    rootDir: packages/chatly-server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    branch: main
