name: Build & Release Chatly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─── Android Release APK ─────────────────────────────────────────────────────
  build-android:
    name: Build Android APK (Signed Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run Flutter analyze (errors only)
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      # Decode the base64-encoded keystore stored in GitHub Secrets
      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: apps/mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > chatly-release.jks
          echo "KEYSTORE_PATH=$PWD/chatly-release.jks" >> $GITHUB_ENV

      - name: Build signed release APKs (split per ABI)
        working-directory: apps/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=BASE_URL=${{ secrets.API_BASE_URL || 'https://chatly-backend.onrender.com' }}

      - name: Build universal fat APK (for sideloading)
        working-directory: apps/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=BASE_URL=${{ secrets.API_BASE_URL || 'https://chatly-backend.onrender.com' }}

      - name: Upload all APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatly-android-apks
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

  # ─── Node.js Backend Build Check ─────────────────────────────────────────────
  build-server:
    name: Build & Validate Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/chatly-server/package-lock.json

      - name: Install server dependencies
        working-directory: packages/chatly-server
        run: npm ci

      - name: Run npm audit (fail on high/critical)
        working-directory: packages/chatly-server
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: TypeScript build check
        working-directory: packages/chatly-server
        run: npm run build
