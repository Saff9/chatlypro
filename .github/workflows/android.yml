name: Build Android APK

on:
  push:
    branches: ["**"]
    paths:
      - "apps/android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    name: Chatly Android (debug standalone, unsigned)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      UPSTREAM_DIR: ${{ github.workspace }}/upstream-cache/telegram-android

    steps:
      - name: Checkout Chatly
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Read pinned upstream ref
        id: pin
        run: |
          pin=$(grep -v '^[[:space:]]*#' apps/android/upstream.txt | grep -v '^[[:space:]]*$' | head -n1)
          echo "url=$(echo "$pin" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$pin" | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache upstream clone
        uses: actions/cache@v4
        with:
          path: upstream-cache/telegram-android
          key: tg-android-${{ steps.pin.outputs.ref }}

      - name: Clone upstream Telegram-Android
        run: |
          if [ ! -d "$UPSTREAM_DIR/.git" ]; then
            git clone --depth 1 --branch "${{ steps.pin.outputs.ref }}" \
              --recurse-submodules --shallow-submodules \
              "${{ steps.pin.outputs.url }}" "$UPSTREAM_DIR"
          else
            git -C "$UPSTREAM_DIR" reset --hard
            git -C "$UPSTREAM_DIR" clean -fdx -- ':!.gradle'
          fi

      - name: Apply Chatly overlay + patches + secrets
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          if [ -z "$TELEGRAM_API_ID" ] || [ -z "$TELEGRAM_API_HASH" ]; then
            echo '::warning::TELEGRAM_API_ID / TELEGRAM_API_HASH are not set as repo secrets.'
            echo '::warning::Using dummy compile-only credentials. The resulting APK will NOT be able to log in to Telegram.'
            echo '::warning::Get real values from https://my.telegram.org and add as repo secrets to fix this.'
            export TELEGRAM_API_ID=1
            export TELEGRAM_API_HASH=00000000000000000000000000000000
          fi

          # Apply overlay if non-empty.
          if [ -d apps/android/overlay ] && [ -n "$(ls -A apps/android/overlay 2>/dev/null | grep -v gitkeep)" ]; then
            cp -R apps/android/overlay/. "$UPSTREAM_DIR/"
          fi

          # Apply patches in lexical order.
          if [ -d apps/android/patches ]; then
            for p in apps/android/patches/*.patch; do
              [ -e "$p" ] || continue
              echo "Applying $(basename "$p")"
              git -C "$UPSTREAM_DIR" apply --whitespace=nowarn "$p"
            done
          fi

          # Inject API credentials into BuildVars.java.
          BUILDVARS="$UPSTREAM_DIR/TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          if [ -f "$BUILDVARS" ]; then
            python3 apps/android/build-helpers/inject_credentials.py \
              "$BUILDVARS" "$TELEGRAM_API_ID" "$TELEGRAM_API_HASH" || true
          else
            echo "::warning::BuildVars.java not found at expected location."
          fi

      - name: Build the Chatly Android Docker image
        run: |
          # We don't use upstream's Dockerfile directly because at this tag it
          # pins gradle 7.0.2 while the source pins AGP 8.4.2 (needs Gradle 8.6+).
          # See apps/android/build-helpers/Dockerfile for the explanation.
          docker build -t chatly-android-builder -f apps/android/build-helpers/Dockerfile .

      - name: Build APK
        run: |
          docker run --rm \
            -v "$UPSTREAM_DIR":/home/source \
            -w /home/source \
            chatly-android-builder \
            bash -c '
              set -euo pipefail
              mkdir -p /home/source/TMessagesProj/build/outputs/apk
              cp -R /home/source/. /home/gradle
              cd /home/gradle
              gradle :TMessagesProj_AppStandalone:assembleAfatStandalone --no-daemon --stacktrace
              mkdir -p /home/source/out
              find TMessagesProj_AppStandalone/build/outputs/apk -name "*.apk" -exec cp -v {} /home/source/out/ \;
            '

      - name: Collect APK
        run: |
          mkdir -p apps/android/out
          if [ -d "$UPSTREAM_DIR/out" ]; then
            cp -v "$UPSTREAM_DIR"/out/*.apk apps/android/out/ 2>/dev/null || true
          fi
          ls -la apps/android/out

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Chatly-Android-debug
          path: apps/android/out/*.apk
          if-no-files-found: error
          retention-days: 14
